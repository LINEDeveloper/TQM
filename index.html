<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>บันทึกก้าวเดิน</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600&family=Sarabun:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root { --primary: #1976D2; --bg-color: #E3F2FD; --card-bg: #FFFFFF; --text-main: #333; --text-sub: #666; }
    body { font-family: 'Sarabun', sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .card { background: var(--card-bg); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; box-sizing: border-box; }
    h2 { font-family: 'Kanit', sans-serif; text-align: center; color: var(--primary); margin: 0 0 5px 0; font-size: 26px;}
    .app-desc { font-size: 13px; color: var(--text-sub); text-align: center; margin-bottom: 20px; background: #F0F4F8; padding: 12px; border-radius: 8px; line-height: 1.5; }
    input { width: 100%; padding: 12px 15px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
    input[type="file"] { padding: 10px; font-size: 14px; background: #f9f9f9; }
    .input-label { display: block; font-size: 13px; font-weight: 600; color: var(--text-sub); margin-bottom: 5px; }
    .sync-btn { width: 100%; padding: 14px; color: white; background-color: var(--primary); border: none; border-radius: 10px; font-size: 16px; font-weight: 600; font-family: 'Kanit', sans-serif; cursor: pointer; margin-top: 10px;}
    .sync-btn:disabled { background-color: #ccc; }
    #status-text { text-align: center; font-size: 14px; margin-top: 15px; font-weight: 600;}
    .logo-header { text-align: center; margin-bottom: 15px; }
    .logo-header img { max-width: 130px; height: auto; }
    .profile-container { text-align: center; margin-bottom: 20px; }
    .profile-pic { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 4px solid white; box-shadow: 0 4px 15px rgba(25,118,210,0.3); background-color: #f0f0f0; display: none; margin: 0 auto 10px auto; }
    .welcome-text { font-size: 16px; font-weight: 600; color: var(--text-main); }
    .welcome-name { color: var(--primary); font-size: 20px; font-family: 'Kanit', sans-serif; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-header"><img src="https://img2.pic.in.th/Google-Fit.png" alt="Logo"></div>
    <h2 id="main-title">บันทึกก้าวเดิน</h2>
    <div class="app-desc" id="appDescription">กิจกรรมส่งเสริมสุขภาพพนักงาน<br>กรุณากรอกยอดก้าวเดินและแนบรูปภาพเพื่อสะสมคะแนน</div>
    
    <div class="profile-container" id="profile-container" style="display: none;">
      <img id="userProfilePic" class="profile-pic" src="" alt="LINE Profile">
      <div id="welcome-text" class="welcome-text">กำลังตรวจสอบข้อมูล...</div>
    </div>
    
    <button class="sync-btn" id="lineLoginBtn" onclick="liff.login()" style="display: none; background-color:#00B900;">เข้าสู่ระบบด้วย LINE</button>

    <div id="form-section" style="display: none;">
      <div id="register-section" style="display: none;">
        <input type="text" id="firstName" placeholder="ชื่อจริง (ไม่ต้องใส่คำนำหน้า)">
        <input type="text" id="lastName" placeholder="นามสกุล">
      </div>
      <label class="input-label">ยอดก้าวเดินวันนี้ (ตัวเลขเท่านั้น)</label>
      <input type="number" id="stepCount" placeholder="เช่น 8500" required>
      <label class="input-label">อัปโหลดรูปภาพหลักฐาน</label>
      <input type="file" id="proofImage" accept="image/*" required>
      <button class="sync-btn" onclick="submitData()" id="syncBtn">ส่งหลักฐานและบันทึกก้าว</button>
      <div id="status-text"></div>
    </div>

    <div id="result-section" style="display: none; text-align: center;">
      <h3 id="result-title"></h3>
      <div id="step-result" style="margin: 5px 0;"></div>
      <a href="../Leaderboard/leaderboard.html" class="sync-btn" style="display:inline-block; text-decoration:none;">🏆 ดูอันดับความฟิต</a>
    </div>
  </div>

  <script>
    // 🛑 2. นำ URL ของเว็บแอป (GAS) มาใส่ตรงนี้
    const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxrVlxtauXbluDvfbEWL-ly8_w74XQqeuWkeXB5frCADf8rYIh7VLFzSAPuo5M6BFla_g/exec';
    const LIFF_ID = '2009549576-6bsF9G5Z'; 
    let lineUserId = "Unknown", isRegistered = false, savedFirstName = "", savedLastName = "", savedPicUrl = "";

    async function main() {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) {
         document.getElementById('lineLoginBtn').style.display = "block"; 
      } else {
        const profile = await liff.getProfile();
        lineUserId = profile.userId;
        document.getElementById('profile-container').style.display = "block";
        if (profile.pictureUrl) {
          savedPicUrl = profile.pictureUrl;
          document.getElementById('userProfilePic').src = profile.pictureUrl;
          document.getElementById('userProfilePic').style.display = 'block'; 
        }
        checkUserInDatabase(lineUserId);
      }
    }
    window.onload = main;

    async function checkUserInDatabase(uid) {
      try {
        const response = await fetch(GAS_WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'checkUser', uid: uid }) });
        const user = await response.json();
        if (user) {
          isRegistered = true; savedFirstName = user.firstName; savedLastName = user.lastName;
          document.getElementById('welcome-text').innerHTML = `ยินดีต้อนรับ<br><span class="welcome-name">คุณ ${user.firstName} ${user.lastName}</span>`;
          if (user.hasSubmittedToday) {
            document.getElementById('appDescription').style.display = "none";
            document.getElementById('result-section').style.display = "block";
            document.getElementById('result-title').innerText = "ส่งข้อมูลของวันนี้แล้ว";
            document.getElementById('result-title').style.color = "#FF9800";
            document.getElementById('step-result').innerHTML = `<div style="font-size:50px; margin:15px 0;">✅</div><div style="color:#666;">ระบบรับข้อมูลได้วันละ 1 ครั้งเท่านั้น<br>พรุ่งนี้อย่าลืมมาส่งใหม่นะ ✌️</div>`;
          } else { document.getElementById('form-section').style.display = "block"; }
        } else {
          document.getElementById('welcome-text').innerHTML = `<span style="color:#FF6D00;">ลงทะเบียนใช้งานครั้งแรก</span>`;
          document.getElementById('form-section').style.display = "block";
          document.getElementById('register-section').style.display = "block"; 
        }
      } catch (error) { document.getElementById('welcome-text').innerText = "เชื่อมต่อฐานข้อมูลล้มเหลว"; }
    }

    function submitData() {
      let fName = isRegistered ? savedFirstName : document.getElementById('firstName').value.trim();
      let lName = isRegistered ? savedLastName : document.getElementById('lastName').value.trim();
      const stepInput = document.getElementById('stepCount').value.trim();
      const fileInput = document.getElementById('proofImage');

      if (!fName || !lName || !stepInput || fileInput.files.length === 0) return alert("กรุณากรอกข้อมูลให้ครบถ้วนครับ");
      const steps = parseInt(stepInput);
      if (steps < 7000) return alert("⚠️ ยังไม่ถึงเกณฑ์ 7,000 ก้าว ระบบไม่สามารถบันทึกข้อมูลได้ครับ");

      document.getElementById('syncBtn').disabled = true;
      document.getElementById('status-text').style.color = "var(--primary)";
      document.getElementById('status-text').innerText = "⏳ กำลังอัปโหลดข้อมูล...";

      const reader = new FileReader();
      reader.onload = function(e) {
        const payload = {
          action: 'submitSteps', uid: lineUserId, firstName: fName, lastName: lName, steps: steps,
          pictureUrl: savedPicUrl, imageFile: e.target.result.split(',')[1], mimeType: fileInput.files[0].type, fileName: lineUserId + "_" + Date.now()
        };

        fetch(GAS_WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) })
        .then(res => res.json())
        .then(res => {
          if (res.status === "success") {
            document.getElementById("form-section").style.display = "none";
            document.getElementById("appDescription").style.display = "none";
            document.getElementById("result-section").style.display = "block";
            document.getElementById("main-title").innerText = "🎉 บันทึกข้อมูลสำเร็จ";
            document.getElementById("step-result").innerHTML = `<div style="background:#F4F9FF; border:2px dashed #1976D2; padding:20px; border-radius:15px; margin:15px 0;"><div style="font-size:45px;">🏃‍♂️💨</div><div style="font-size:36px; font-weight:bold; color:#1976D2;">${res.steps.toLocaleString()} ก้าว</div></div><div style="color:#28a745; font-weight:600;">เยี่ยมเลย! ยอดคุณถึง 7,000 ก้าว!</div>`;
          } else if (res.status === "already_submitted") { alert("วันนี้ส่งยอดก้าวเดินไปแล้วครับ"); window.location.reload(); }
        }).catch(err => { alert("เกิดข้อผิดพลาด"); document.getElementById('syncBtn').disabled = false; document.getElementById('status-text').innerText = ""; });
      };
      reader.readAsDataURL(fileInput.files[0]);
    }
  </script>
</body>
</html>
